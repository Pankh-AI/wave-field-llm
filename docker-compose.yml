services:
  # S1: 22M params, 20M tokens (~25 min on 3060)
  s1:
    build: .
    container_name: wave-s1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S1
      - DATASET=2

  # S1+H1: 22M params, 20M tokens, local_window=64 (~25 min on 3060)
  s1-h1:
    build: .
    container_name: wave-s1-h1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S1
      - DATASET=2
      - LOCAL_WINDOW=64

  # S1-Hybrid: 1 dedicated standard attention at L3, SpectralGate ON (~15 min)
  s1-hybrid:
    build: .
    container_name: wave-s1-hybrid
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S1
      - DATASET=2
      - HYBRID_LAYERS=3
      - SPECTRAL_GATE=1
      - USE_CHECKPOINT=0
      - MODEL=wave

  # S1-Delta: V4.6.0 + additive delta-rule correction in wave layers (~15 min)
  s1-delta:
    build: .
    container_name: wave-s1-delta
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S1
      - DATASET=2
      - HYBRID_LAYERS=3
      - SPECTRAL_GATE=1
      - DELTA_CORRECTION=1
      - TORCH_COMPILE=0
      - USE_CHECKPOINT=0
      - MODEL=wave

  # S1-2K: same params as S1 but seq=2048 — where O(n log n) matters (~30 min)
  s1-2k:
    build: .
    container_name: wave-s1-2k
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S1-2K
      - DATASET=2
      - HYBRID_LAYERS=3
      - SPECTRAL_GATE=1
      - KERNEL_LR_MULT=15.0
      - USE_CHECKPOINT=0
      - MONITOR_SNAPSHOTS=3
      - MODEL=standard

  # S1+GLA: 22M params, 20M tokens, GLA at L3+L7 with weight sharing (~25 min)
  s1-gla:
    build: .
    container_name: wave-s1-gla
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S1
      - DATASET=2
      - GLA_LAYERS=3,7

  # S2: 55M params, 50M tokens (~2.3 hrs on 3060)
  s2:
    build: .
    container_name: wave-s2
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S2
      - DATASET=2

  # S3: 100M params, 100M tokens (~9 hrs on 3060, needs WikiText-103)
  s3:
    build: .
    container_name: wave-s3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_scaling.py
      - SCALE=S3
      - DATASET=103

  # Long-context: 2K seq — speed crossover zone (~15 min on 3060)
  lc-2k:
    build: .
    container_name: wave-lc-2k
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_long_context.py
      - CONFIGS=K,L
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=5000000

  # Long-context: 4K seq — the real test (~20 min on 3060)
  lc-4k:
    build: .
    container_name: wave-lc-4k
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_long_context.py
      - CONFIGS=C,D
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=5000000

  # Long-context: 2K+4K sweet spot combined (~35 min on 3060)
  lc-sweet:
    build: .
    container_name: wave-lc-sweet
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_long_context.py
      - CONFIGS=K,L,C,D
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=5000000

  # Experiment A: PPL Gap vs Sequence Length — all 6 configs (~1.5 hrs on 3060)
  exp-a:
    build: .
    container_name: wave-exp-a
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_seq_scaling.py
      - DATASET=103
      - CONFIGS=W512,S512,W2K,S2K,W4K,S4K
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=20000000

  # Experiment A: seq=512 pair only (~25 min)
  exp-a-512:
    build: .
    container_name: wave-exp-a-512
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_seq_scaling.py
      - DATASET=103
      - CONFIGS=W512,S512
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=20000000

  # Experiment A: seq=2048 pair only (~35 min)
  exp-a-2k:
    build: .
    container_name: wave-exp-a-2k
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_seq_scaling.py
      - DATASET=103
      - CONFIGS=W2K,S2K
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=20000000

  # Experiment A: seq=4096 pair only (~50 min)
  exp-a-4k:
    build: .
    container_name: wave-exp-a-4k
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_seq_scaling.py
      - DATASET=103
      - CONFIGS=W4K,S4K
      - FROZEN_HEADS=4
      - TOKEN_BUDGET=20000000

  # Battle Plan: E0+F1 quick (~20 min per pair)
  battle-quick:
    build: .
    container_name: wave-battle-quick
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=scripts/battle_plan.py
      - BATTLE_EXP=F2,H1,C1
      - BATTLE_TOKENS=10000000
    command: ["sh", "-c", "python -u scripts/battle_plan.py --exp $${BATTLE_EXP:-F2,H1,C1} --token-budget $${BATTLE_TOKENS:-10000000}"]

  # Battle Plan: All experiments (~2 hrs)
  battle-all:
    build: .
    container_name: wave-battle-all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
    command: ["sh", "-c", "python -u scripts/battle_plan.py --exp ALL --token-budget 10000000"]

  # V4.3 benchmark (original 5M token comparison)
  v43:
    build: .
    container_name: wave-v43
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./results:/app/results
      - data-cache:/app/.cache
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/.cache/huggingface
      - BENCHMARK=benchmarks/benchmark_v43.py

volumes:
  data-cache:
