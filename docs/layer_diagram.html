<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Field LLM — Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0c0c14;
    --surface: #13131f;
    --surface2: #1a1a2a;
    --border: #2a2a3d;
    --text: #e0e0ee;
    --text2: #8888a0;
    --accent: #00d4aa;
    --accent2: #00b4d8;
    --wave: #0891b2;
    --wave-glow: #06b6d420;
    --attn: #dc2626;
    --attn-glow: #dc262620;
    --gla: #8b5cf6;
    --intf: #eab308;
    --ffn: #22c55e;
    --math: #c084fc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .hero {
    text-align: center;
    padding: 50px 20px 30px;
    background: linear-gradient(180deg, #0c0c1a 0%, var(--bg) 100%);
    position: relative;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
  .hero h1 {
    font-size: 36px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .hero .sub {
    color: var(--text2);
    font-size: 15px;
    margin-top: 8px;
    font-weight: 300;
  }
  .hero .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat .val {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
  }
  .stat .label {
    font-size: 11px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Sections ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

  .section-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 20px;
    padding-left: 4px;
  }

  /* ── Model Stack ── */
  .model-stack {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    margin-bottom: 50px;
  }

  .layer-card {
    width: 100%;
    max-width: 700px;
    padding: 14px 24px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .layer-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 1.5px;
    background: linear-gradient(135deg, var(--glow-color, transparent), transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.5;
  }
  .layer-card:hover { transform: translateY(-1px); filter: brightness(1.1); }
  .layer-card.active { outline: 2px solid var(--accent); outline-offset: 2px; }

  .layer-card .left { display: flex; align-items: center; gap: 12px; }
  .layer-card .idx {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    opacity: 0.5;
    width: 24px;
  }
  .layer-card .name { font-weight: 600; font-size: 14px; }
  .layer-card .type-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .layer-card .params {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text2);
  }

  .lc-wave { background: #0891b210; --glow-color: var(--wave); }
  .lc-wave .type-badge { background: var(--wave); color: #fff; }
  .lc-attn { background: #dc262610; --glow-color: var(--attn); }
  .lc-attn .type-badge { background: var(--attn); color: #fff; }
  .lc-intf { background: #eab30810; --glow-color: var(--intf); }
  .lc-intf .type-badge { background: var(--intf); color: #000; }
  .lc-io { background: var(--surface); }
  .lc-io .type-badge { background: var(--border); color: var(--text2); }

  .connector {
    width: 2px;
    height: 12px;
    background: linear-gradient(180deg, var(--border), var(--border));
    position: relative;
  }
  .connector::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: -3px;
    width: 8px;
    height: 8px;
    border-left: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    transform: rotate(-45deg);
  }

  /* ── Detail Panel ── */
  .detail-section { margin-top: 10px; }

  .detail-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 40px;
  }
  .detail-card h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .detail-card .desc {
    color: var(--text2);
    font-size: 13px;
    margin-bottom: 24px;
  }

  /* ── Flow diagram inside detail ── */
  .flow {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .flow-step {
    display: grid;
    grid-template-columns: 40px 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 12px 16px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .flow-step:hover { border-color: var(--border); }

  .flow-step .step-num {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }
  .step-proj .step-num { background: #3b82f620; color: #60a5fa; }
  .step-fm .step-num { background: #8b5cf620; color: #a78bfa; }
  .step-fft .step-num { background: #0891b220; color: #22d3ee; }
  .step-gate .step-num { background: #f59e0b20; color: #fbbf24; }
  .step-ffn .step-num { background: #22c55e20; color: #4ade80; }
  .step-attn .step-num { background: #dc262620; color: #f87171; }

  .flow-step .step-body h4 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .flow-step .step-body .math {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--math);
    line-height: 1.8;
  }
  .flow-step .step-body .shape {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
  }
  .flow-step .step-meta {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    white-space: nowrap;
  }
  .flow-step .step-meta .flops { color: var(--intf); }
  .flow-step .step-meta .params { color: var(--text2); }

  .flow-arrow {
    text-align: center;
    color: var(--border);
    font-size: 14px;
    line-height: 1;
    padding: 2px 0;
  }

  /* ── Equation box ── */
  .eq-box {
    background: #0a0a18;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin: 20px 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 2;
    color: #c0c0ff;
    overflow-x: auto;
  }
  .eq-box .eq-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 8px;
    display: block;
  }
  .eq-box .highlight { color: var(--accent); font-weight: 500; }
  .eq-box .warn { color: var(--attn); }

  /* ── Breakdown table ── */
  .breakdown {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 16px;
  }
  .breakdown th {
    text-align: left;
    padding: 10px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
  }
  .breakdown td {
    padding: 8px 12px;
    border-bottom: 1px solid #1a1a2a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .breakdown tr:hover td { background: #ffffff05; }
  .breakdown .bar-cell { position: relative; }
  .breakdown .bar {
    position: absolute;
    left: 0;
    top: 2px;
    bottom: 2px;
    border-radius: 3px;
    opacity: 0.15;
  }

  /* ── Callout ── */
  .callout {
    border-radius: 10px;
    padding: 14px 18px;
    font-size: 13px;
    margin-top: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .callout-warn { background: #f59e0b10; border: 1px solid #f59e0b30; }
  .callout-info { background: #0891b210; border: 1px solid #0891b230; }
  .callout-icon { font-size: 18px; line-height: 1.4; }

  /* ── Two-col compare ── */
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 16px 0;
  }
  .compare-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 16px;
    border: 1px solid var(--border);
  }
  .compare-box h4 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .compare-box .math {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--math);
    line-height: 1.8;
  }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
  .tab {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface2);
    border: 1px solid transparent;
    color: var(--text2);
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--border); color: var(--text); }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── Visual: wave kernel ── */
  .kernel-viz {
    display: flex;
    gap: 20px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .kernel-viz canvas {
    background: #0a0a18;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
</style>
</head>
<body>

<!-- ════════════ HERO ════════════ -->
<div class="hero">
  <h1>Wave Field Transformer</h1>
  <div class="sub">Physics-based O(n log n) language model with hybrid attention &mdash; V4.7</div>
  <div class="stats">
    <div class="stat"><div class="val">19.7M</div><div class="label">Parameters</div></div>
    <div class="stat"><div class="val">8</div><div class="label">Layers</div></div>
    <div class="stat"><div class="val">384</div><div class="label">Model Dim</div></div>
    <div class="stat"><div class="val">8</div><div class="label">Heads</div></div>
    <div class="stat"><div class="val">512</div><div class="label">Seq Length</div></div>
  </div>
</div>

<div class="container">

<!-- ════════════ MODEL STACK ════════════ -->
<div class="section-title">Model Architecture &mdash; click any layer</div>
<div class="model-stack" id="stack"></div>

<!-- ════════════ DETAIL PANELS ════════════ -->
<div class="detail-section" id="detail-section"></div>

</div>

<script>
// ── Layer definitions ──
const layers = [
  { id:'input', type:'io', name:'Input', detail:'Embedding(8000,384) + Sinusoidal PE + Dropout', params:'3.07M', badge:'INPUT' },
  { id:'L0', type:'wave', name:'Layer 0', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:0 },
  { id:'L1', type:'wave', name:'Layer 1', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:1 },
  { id:'L2', type:'wave', name:'Layer 2', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:2 },
  { id:'L3', type:'attn', name:'Layer 3', detail:'Standard Multi-Head Attention + FFN', params:'1.77M', badge:'ATTENTION', idx:3 },
  { id:'L4', type:'wave', name:'Layer 4', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:4 },
  { id:'L5', type:'wave', name:'Layer 5', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:5 },
  { id:'I0', type:'intf', name:'Interference', detail:'Causal global context + phase-gated mixing', params:'666K', badge:'INTERFERENCE' },
  { id:'L6', type:'wave', name:'Layer 6', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:6 },
  { id:'L7', type:'wave', name:'Layer 7', detail:'Wave Field Attention + FFN', params:'1.93M', badge:'WAVE', idx:7 },
  { id:'I1', type:'intf', name:'Interference', detail:'Causal global context + phase-gated mixing', params:'666K', badge:'INTERFERENCE' },
  { id:'output', type:'io', name:'Output', detail:'LayerNorm + Linear(tied) \u2192 8000 logits', params:'768', badge:'OUTPUT' },
];

// Build stack
const stack = document.getElementById('stack');
layers.forEach((l, i) => {
  if (i > 0) {
    const conn = document.createElement('div');
    conn.className = 'connector';
    stack.appendChild(conn);
  }
  const card = document.createElement('div');
  card.className = `layer-card lc-${l.type}`;
  card.dataset.id = l.id;
  card.innerHTML = `
    <div class="left">
      <span class="idx">${l.type==='io'||l.type==='intf' ? '' : l.id}</span>
      <span class="name">${l.name}</span>
      <span class="type-badge">${l.badge}</span>
    </div>
    <span class="params">${l.params}</span>
  `;
  card.onclick = () => showDetail(l);
  stack.appendChild(card);
});

// ── Detail content generators ──
function waveHTML(l) {
  const idx = l.idx;
  const layerFrac = idx / 7;
  const freqScale = (0.5 * Math.pow(4.0, layerFrac)).toFixed(1);
  const dampCenter = (-1.4 + 1.4 * layerFrac).toFixed(2);

  return `
<div class="detail-card">
  <h2 style="color:var(--wave)">${l.name} &mdash; Wave Field Attention</h2>
  <div class="desc">O(n log n) per layer &bull; 1.93M params &bull; Freq scale: ${freqScale}x HiPPO &bull; Damp center: softplus(${dampCenter})</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab(this,'tab-flow-${idx}')">Data Flow</div>
    <div class="tab" onclick="switchTab(this,'tab-math-${idx}')">Math</div>
    <div class="tab" onclick="switchTab(this,'tab-breakdown-${idx}')">Param &amp; FLOP Budget</div>
  </div>

  <!-- TAB: Data Flow -->
  <div class="tab-content active" id="tab-flow-${idx}">
  <div class="flow">
    <div class="flow-step step-proj">
      <div class="step-num">1</div>
      <div class="step-body">
        <h4>QKVG Fused Projection</h4>
        <div class="math">[Q, K, V, Gate] = LayerNorm(x) &middot; W<sub>qkvg</sub> + b</div>
        <div class="shape">(B,512,384) &rarr; 4&times;(B,8,512,48)</div>
      </div>
      <div class="step-meta"><div class="params">591K</div><div class="flops">604M FLOPs</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-fm">
      <div class="step-num">2</div>
      <div class="step-body">
        <h4>Learned Feature Maps (Hedgehog)</h4>
        <div class="math">&phi;(x) = ReLU(W<sub>2</sub>&middot;GELU(W<sub>1</sub>&middot;x)) + &epsilon;</div>
        <div class="math">Q' = &phi;<sub>q</sub>(Q), &nbsp; K' = &phi;<sub>k</sub>(K) &nbsp; [positive, identity-init]</div>
        <div class="shape">(B,8,512,48) &rarr; (B,8,512,48) each</div>
      </div>
      <div class="step-meta"><div class="params">9.4K</div><div class="flops">75M FLOPs</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-fft">
      <div class="step-num">3</div>
      <div class="step-body">
        <h4>Deposit: K' &odot; V</h4>
        <div class="math">deposit<sub>j</sub>[d] = &phi;<sub>k</sub>(k<sub>j</sub>)[d] &times; v<sub>j</sub>[d]</div>
        <div class="shape">(B,8,512,48) &mdash; element-wise</div>
      </div>
      <div class="step-meta"><div class="flops">~0.2M</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-fft">
      <div class="step-num">4</div>
      <div class="step-body">
        <h4>Scatter &rarr; FFT Convolve &rarr; Gather</h4>
        <div class="math">field[p(j)] += deposit<sub>j</sub> &nbsp;&nbsp; [scatter, stride=1]</div>
        <div class="math">field = IFFT(FFT(field) &times; K&#770;(&alpha;,&omega;,&phi;)) &nbsp; [wave kernel]</div>
        <div class="math">gathered<sub>i</sub> = field[p(i)] &nbsp;&nbsp; [gather]</div>
        <div class="shape">field: (B,8,512,48), pad to 1024 for FFT</div>
      </div>
      <div class="step-meta"><div class="params">24 (!)</div><div class="flops">12M FLOPs</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-fft">
      <div class="step-num">5</div>
      <div class="step-body">
        <h4>Cross-Head Field Coupling</h4>
        <div class="math">coupled<sub>h</sub> = &sum;<sub>h'</sub> softmax(C)<sub>h,h'</sub> &middot; field<sub>h'</sub></div>
        <div class="shape">C: (8,8) mixing matrix, identity-init</div>
      </div>
      <div class="step-meta"><div class="params">64</div><div class="flops">3M FLOPs</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-gate">
      <div class="step-num">6</div>
      <div class="step-body">
        <h4>Q-Read + Cross-Dim + Gate</h4>
        <div class="math">read = W<sub>cross</sub>(&phi;<sub>q</sub>(Q) &odot; gathered)</div>
        <div class="math">output = &sigma;(Gate) &odot; read &nbsp; [gate bias=2.0, starts open]</div>
        <div class="shape">(B,8,512,48) &rarr; reshape (B,512,384)</div>
      </div>
      <div class="step-meta"><div class="params">2.3K</div><div class="flops">19M FLOPs</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-proj">
      <div class="step-num">7</div>
      <div class="step-body">
        <h4>Output Projection + Residual</h4>
        <div class="math">x = x + Dropout(W<sub>out</sub> &middot; output + b)</div>
        <div class="shape">(B,512,384)</div>
      </div>
      <div class="step-meta"><div class="params">148K</div><div class="flops">151M FLOPs</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-ffn">
      <div class="step-num">8</div>
      <div class="step-body">
        <h4>Feed-Forward Network</h4>
        <div class="math">x = x + W<sub>2</sub>&middot;GELU(W<sub>1</sub>&middot;LayerNorm(x))</div>
        <div class="math">384 &rarr; 1536 &rarr; GELU &rarr; 1536 &rarr; 384</div>
      </div>
      <div class="step-meta"><div class="params">1.18M</div><div class="flops">1,208M FLOPs</div></div>
    </div>
  </div>

  <div class="callout callout-info">
    <span class="callout-icon">&equiv;</span>
    <div>The FFT convolution (step 4) is only <strong>12M FLOPs</strong> &mdash; 0.6% of the layer.
    FFN dominates at 58%. The "wave physics" is computationally almost free;
    the cost is in projections and FFN, same as a standard transformer.</div>
  </div>
  </div>

  <!-- TAB: Math -->
  <div class="tab-content" id="tab-math-${idx}">
  <div class="eq-box">
    <span class="eq-label">Wave Kernel (per head h)</span>
    k<sub>h</sub>(t) = e<sup>-&alpha;<sub>h</sub>&middot;t</sup> &middot; cos(&omega;<sub>h</sub>&middot;t + &phi;<sub>h</sub>) &nbsp;&nbsp; for t &ge; 0<br>
    &alpha; = softplus(damping).clamp(max=1.5)<br>
    &omega; = frequency &nbsp;&nbsp; &phi; = phase<br>
    <span style="color:var(--text2)">// 3 learnable params per head &times; 8 heads = 24 total</span>
  </div>

  <div class="eq-box">
    <span class="eq-label">Z-Transform (analytic FFT, no materialization)</span>
    &lambda; = -&alpha; + i&omega; &nbsp;&nbsp;&nbsp; c = e<sup>i&phi;</sup><br>
    H(z<sub>k</sub>) = (1 - e<sup>&lambda;G</sup>&middot;z<sub>k</sub><sup>-G</sup>) / (1 - e<sup>&lambda;</sup>&middot;z<sub>k</sub><sup>-1</sup>)<br>
    <span class="highlight">K&#770;(z<sub>k</sub>) = c&middot;H<sub>&lambda;</sub>(z<sub>k</sub>) + c*&middot;H<sub>&lambda;*</sub>(z<sub>k</sub>)</span><br>
    <span style="color:var(--text2)">// Causal by construction. No time-domain needed.</span>
  </div>

  <div class="eq-box">
    <span class="eq-label">Full attention equation (what this layer computes)</span>
    <span class="highlight">out<sub>i</sub>[d'] = &sum;<sub>d</sub> W<sub>cross</sub>[d',d] &middot; &phi;<sub>q</sub>(q<sub>i</sub>)[d] &middot; &sum;<sub>j&le;i</sub> k(i-j) &middot; &phi;<sub>k</sub>(k<sub>j</sub>)[d] &middot; v<sub>j</sub>[d]</span>
  </div>

  <div class="compare">
    <div class="compare-box">
      <h4 style="color:var(--wave)">Wave Field</h4>
      <div class="math">
        weight<sub>ij</sub>[d] = k(i-j) &middot; &phi;<sub>q</sub>[d] &middot; &phi;<sub>k</sub>[d]<br>
        <span style="color:var(--text2)">Same kernel for ALL pairs at distance d</span><br>
        <span style="color:var(--text2)">Per-dim independent (48 scalars)</span><br>
        <span style="color:var(--intf)">O(n log n)</span>
      </div>
    </div>
    <div class="compare-box">
      <h4 style="color:var(--attn)">Standard Attention</h4>
      <div class="math">
        weight<sub>ij</sub> = softmax(q<sub>i</sub>&middot;k<sub>j</sub> / &radic;48)<br>
        <span style="color:var(--text2)">DIFFERENT for every (i,j) pair</span><br>
        <span style="color:var(--text2)">Full dot-product (1 scalar)</span><br>
        <span style="color:var(--attn)">O(n&sup2;)</span>
      </div>
    </div>
  </div>

  <div class="callout callout-warn">
    <span class="callout-icon">&#9888;</span>
    <div>The best possible LTI kernel can only capture <strong>30%</strong> of standard attention's output.
    The remaining 70% requires content-dependent routing (what Layer 3's standard attention provides).
    No kernel shape change can fix this &mdash; it's the LTI wall.</div>
  </div>
  </div>

  <!-- TAB: Breakdown -->
  <div class="tab-content" id="tab-breakdown-${idx}">
  <table class="breakdown">
    <thead><tr><th>Component</th><th>Params</th><th>% Params</th><th>FLOPs</th><th>% FLOPs</th><th></th></tr></thead>
    <tbody>
      <tr><td>QKVG projection</td><td>591K</td><td>30.6%</td><td>604M</td><td>29.1%</td><td class="bar-cell"><div class="bar" style="width:30%;background:var(--accent2)"></div></td></tr>
      <tr><td>Feature maps (Q+K)</td><td>9.4K</td><td>0.5%</td><td>75M</td><td>3.6%</td><td class="bar-cell"><div class="bar" style="width:3.6%;background:var(--gla)"></div></td></tr>
      <tr><td>FFT convolution</td><td>24</td><td>0.001%</td><td>12M</td><td>0.6%</td><td class="bar-cell"><div class="bar" style="width:0.6%;background:var(--wave)"></div></td></tr>
      <tr><td>Coupling + cross_dim</td><td>2.4K</td><td>0.1%</td><td>22M</td><td>1.1%</td><td class="bar-cell"><div class="bar" style="width:1.1%;background:var(--wave)"></div></td></tr>
      <tr><td>Output projection</td><td>148K</td><td>7.6%</td><td>151M</td><td>7.3%</td><td class="bar-cell"><div class="bar" style="width:7.3%;background:var(--accent2)"></div></td></tr>
      <tr><td><strong>FFN</strong></td><td><strong>1,182K</strong></td><td><strong>61.1%</strong></td><td><strong>1,208M</strong></td><td><strong>58.3%</strong></td><td class="bar-cell"><div class="bar" style="width:58%;background:var(--ffn)"></div></td></tr>
      <tr><td>LayerNorms</td><td>1.5K</td><td>0.08%</td><td>~1M</td><td>&lt;0.1%</td><td></td></tr>
    </tbody>
    <tfoot><tr style="border-top:2px solid var(--border)"><td><strong>Total</strong></td><td><strong>1,934K</strong></td><td></td><td><strong>2,073M</strong></td><td></td><td></td></tr></tfoot>
  </table>
  </div>
</div>`;
}

function attnHTML(l) {
  return `
<div class="detail-card">
  <h2 style="color:var(--attn)">${l.name} &mdash; Standard Multi-Head Attention</h2>
  <div class="desc">O(n&sup2;) &bull; 1.77M params &bull; Full content-dependent routing &bull; This single layer cuts gap from ~2.0x to 1.44x</div>

  <div class="flow">
    <div class="flow-step step-proj">
      <div class="step-num">1</div>
      <div class="step-body">
        <h4>QKV Projection</h4>
        <div class="math">Q, K, V = LayerNorm(x) &middot; W<sub>q</sub>, W<sub>k</sub>, W<sub>v</sub></div>
        <div class="shape">(B,512,384) &rarr; 3&times;(B,8,512,48)</div>
      </div>
      <div class="step-meta"><div class="params">443K</div><div class="flops">453M</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-attn">
      <div class="step-num">2</div>
      <div class="step-body">
        <h4>Scaled Dot-Product Attention</h4>
        <div class="math">scores = Q &middot; K<sup>T</sup> / &radic;48 + causal_mask</div>
        <div class="math">attn = softmax(scores) &nbsp;&nbsp; <span style="color:var(--attn)">[the O(n&sup2;) step]</span></div>
        <div class="math">out = attn &middot; V</div>
        <div class="shape">scores: (B,8,<strong>512,512</strong>) &mdash; 262K attention weights per head</div>
      </div>
      <div class="step-meta"><div class="params">0</div><div class="flops">402M</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-proj">
      <div class="step-num">3</div>
      <div class="step-body">
        <h4>Output Projection + Residual</h4>
        <div class="math">x = x + W<sub>out</sub> &middot; concat(heads)</div>
      </div>
      <div class="step-meta"><div class="params">148K</div><div class="flops">151M</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-ffn">
      <div class="step-num">4</div>
      <div class="step-body">
        <h4>Feed-Forward Network</h4>
        <div class="math">x = x + W<sub>2</sub>&middot;GELU(W<sub>1</sub>&middot;LayerNorm(x))</div>
        <div class="math">384 &rarr; 1536 &rarr; GELU &rarr; 384</div>
      </div>
      <div class="step-meta"><div class="params">1.18M</div><div class="flops">1,208M</div></div>
    </div>
  </div>

  <div class="callout callout-warn">
    <span class="callout-icon">&#9889;</span>
    <div><strong>Why this layer matters:</strong> Wave layers route by distance only &mdash; "5 tokens back"
    gets the same weight whether it's "the president" or "a random comma." This layer sees the actual
    content via q&middot;k dot products, enabling semantic routing. One layer at L3 is worth ~0.56x PPL improvement.</div>
  </div>

  <div class="compare">
    <div class="compare-box">
      <h4>FLOPs comparison at n=512</h4>
      <div class="math">
        Wave attention: 109M (FFT+FM+coupling)<br>
        Standard attention: 402M (Q@K + attn@V)<br>
        Wave is <span style="color:var(--accent)">3.7&times; cheaper</span>
      </div>
    </div>
    <div class="compare-box">
      <h4>Crossover point</h4>
      <div class="math">
        n=512: Standard wins (attn=18% of total)<br>
        n=2048: Break even<br>
        n=8192: Wave is <span style="color:var(--accent)">390&times; cheaper</span>
      </div>
    </div>
  </div>
</div>`;
}

function intfHTML(l) {
  return `
<div class="detail-card">
  <h2 style="color:var(--intf)">Field Interference Module</h2>
  <div class="desc">666K params &bull; O(n) &bull; Extends wave kernel's limited reach (~3-21 tokens) with causal global context. Skipped after hybrid/GLA layers.</div>

  <div class="flow">
    <div class="flow-step step-proj">
      <div class="step-num">1</div>
      <div class="step-body">
        <h4>Causal Cumulative Mean</h4>
        <div class="math">compressed = W<sub>c</sub>&middot;x &nbsp;&nbsp; (384&rarr;96)</div>
        <div class="math">ctx<sub>i</sub> = W<sub>e</sub> &middot; (&sum;<sub>j&le;i</sub> compressed<sub>j</sub>) / i &nbsp;&nbsp; (96&rarr;384)</div>
        <div class="shape">Position i sees average of all positions 0..i</div>
      </div>
      <div class="step-meta"><div class="params">74K</div><div class="flops">~76M</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-fm">
      <div class="step-num">2</div>
      <div class="step-body">
        <h4>Phase Alignment</h4>
        <div class="math">local = normalize(W<sub>l</sub>&middot;x)</div>
        <div class="math">global = normalize(W<sub>g</sub>&middot;ctx)</div>
        <div class="math">strength = &sigma;(cos_sim(local, global) / temp)</div>
        <div class="shape">Each W: (384,384). Temp is learnable.</div>
      </div>
      <div class="step-meta"><div class="params">295K</div><div class="flops">~302M</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-gate">
      <div class="step-num">3</div>
      <div class="step-body">
        <h4>Gated Residual</h4>
        <div class="math">gate = &sigma;(W<sub>gate</sub> &middot; [x ; ctx]) &nbsp; (768&rarr;384)</div>
        <div class="math">output = x + gate &odot; ctx &odot; strength</div>
      </div>
      <div class="step-meta"><div class="params">296K</div><div class="flops">~303M</div></div>
    </div>
  </div>

  <div class="callout callout-warn">
    <span class="callout-icon">?</span>
    <div><strong>Is 666K params justified?</strong> Two 384&times;384 matrices (295K) just to compute cosine similarity
    between local and global representations. The actual global context is a simple cumulative mean.
    A lighter design (single gate, ~40K params) might achieve the same effect.</div>
  </div>
</div>`;
}

function inputHTML() {
  return `
<div class="detail-card">
  <h2>Input: Embedding + Position Encoding</h2>
  <div class="desc">3.07M params (15.6% of model) &bull; Weight-tied with output projection</div>

  <div class="flow">
    <div class="flow-step step-proj">
      <div class="step-num">1</div>
      <div class="step-body">
        <h4>Token Embedding</h4>
        <div class="math">E &isin; R<sup>8000&times;384</sup> &nbsp;&nbsp; x = E[token_ids]</div>
        <div class="shape">(B, 512) &rarr; (B, 512, 384)</div>
      </div>
      <div class="step-meta"><div class="params">3.07M</div></div>
    </div>
    <div class="flow-arrow">+</div>

    <div class="flow-step step-fm">
      <div class="step-num">2</div>
      <div class="step-body">
        <h4>Sinusoidal Position Encoding</h4>
        <div class="math">PE[pos, 2i] = sin(pos / 10000<sup>2i/384</sup>)</div>
        <div class="math">PE[pos, 2i+1] = cos(pos / 10000<sup>2i/384</sup>)</div>
        <div class="shape">(512, 384) &mdash; precomputed, no learnable params</div>
      </div>
      <div class="step-meta"><div class="params">0</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-gate">
      <div class="step-num">3</div>
      <div class="step-body">
        <h4>Dropout(0.1)</h4>
        <div class="shape">x = Dropout(Embedding + PosEnc)</div>
      </div>
    </div>
  </div>
</div>`;
}

function outputHTML() {
  return `
<div class="detail-card">
  <h2>Output: LayerNorm + Tied Projection</h2>
  <div class="desc">768 new params (LayerNorm only) &bull; Projection shares Embedding weights</div>

  <div class="flow">
    <div class="flow-step step-proj">
      <div class="step-num">1</div>
      <div class="step-body">
        <h4>Final LayerNorm</h4>
        <div class="math">x = &gamma; &middot; (x - &mu;) / &sigma; + &beta;</div>
        <div class="shape">&gamma;, &beta; &isin; R<sup>384</sup></div>
      </div>
      <div class="step-meta"><div class="params">768</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-proj">
      <div class="step-num">2</div>
      <div class="step-body">
        <h4>Output Projection (weight-tied)</h4>
        <div class="math">logits = x &middot; E<sup>T</sup></div>
        <div class="shape">(B,512,384) &times; (384,8000) &rarr; (B,512,8000)</div>
      </div>
      <div class="step-meta"><div class="params">tied</div><div class="flops">~3.1G</div></div>
    </div>
    <div class="flow-arrow">&darr;</div>

    <div class="flow-step step-attn">
      <div class="step-num">3</div>
      <div class="step-body">
        <h4>Cross-Entropy Loss</h4>
        <div class="math">loss = -log(softmax(logits)<sub>target</sub>)</div>
        <div class="shape">scalar, averaged over B&times;512 tokens</div>
      </div>
    </div>
  </div>
</div>`;
}

// ── Show detail ──
function showDetail(l) {
  document.querySelectorAll('.layer-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.layer-card[data-id="${l.id}"]`);
  if (card) card.classList.add('active');

  const sec = document.getElementById('detail-section');
  if (l.type === 'wave') sec.innerHTML = waveHTML(l);
  else if (l.type === 'attn') sec.innerHTML = attnHTML(l);
  else if (l.type === 'intf') sec.innerHTML = intfHTML(l);
  else if (l.id === 'input') sec.innerHTML = inputHTML();
  else if (l.id === 'output') sec.innerHTML = outputHTML();

  sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function switchTab(el, targetId) {
  const card = el.closest('.detail-card');
  card.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  card.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(targetId).classList.add('active');
}

// Default
showDetail(layers[1]); // L0
